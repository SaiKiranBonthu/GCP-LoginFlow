<div class="landing-container">
    <div class="hero-card">
        <h1>Google Cloud Marketplace</h1>
        <h2>Hello World SaaS Application</h2>
        <p>
            This application demonstrates the complete onboarding flow
            for a SaaS product published on Google Cloud Marketplace.
        </p>
        <div class="button-group">
            <a routerLink="/signup" [queryParams]="{ token: 'demo-marketplace-token' }" class="btn primary">
                Continue Setup
            </a>
            <a routerLink="/signin" class="btn secondary">
                Sign In
            </a>
        </div>
    </div>
</div>
