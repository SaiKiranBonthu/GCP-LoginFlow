<div class="signin-container">
    <div class="signin-card">
        <h1>Hello World SaaS</h1>
        <h2>Welcome Back</h2>
        <p>
            Sign in with your Google account to continue.
        </p>

        <div class="google-button">
            <!-- <asl-google-signin-button type="standard" size="large" text="signin_with" shape="rectangular">
            </asl-google-signin-button> -->
        </div>

        @if (isLoading) {
        <p class="loading-message">
            Authenticating...
        </p>
        }

        @if (errorMessage) {
        <p class="error-message">
            {{ errorMessage }}
        </p>
        }
    </div>
</div>
