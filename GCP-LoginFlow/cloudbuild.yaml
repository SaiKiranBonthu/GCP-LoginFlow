steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '.'
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - '${_SERVICE_NAME}'
  - '--image'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - managed
  - '--allow-unauthenticated'
  - '--port'
  - '8080'
images:
- '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
substitutions:
  _REGION: 'asia-south1'
  _REPOSITORY: 'marketplace-saas'
  _IMAGE_NAME: 'marketplace-frontend'
  _SERVICE_NAME: 'marketplace-frontend'
options:
  logging: CLOUD_LOGGING_ONLY
