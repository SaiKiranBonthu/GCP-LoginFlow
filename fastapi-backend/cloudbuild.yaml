steps:
# Step 0: Build the FastAPI Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-f'
  - 'fastapi-backend/Dockerfile'
  - '-t'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - 'fastapi-backend'

# Step 1: Push image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'

# Step 2: Deploy image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'

  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--add-cloudsql-instances'
  - '${_INSTANCE_CONNECTION_NAME}'
  - '--set-env-vars'
  - 'DB_NAME=${_DB_NAME},DB_USER=${_DB_USER},DB_PASSWORD=${_DB_PASSWORD},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}'

images:
- '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'

substitutions:
  _REGION: 'asia-south1'
  _REPOSITORY: 'marketplace-saas'
  _IMAGE_NAME: 'marketplace-saas-backend'
  _SERVICE_NAME: 'marketplace-saas-backend'
  _DB_NAME: 'marketplace_saas'
  _DB_USER: 'marketplace_app'
  _INSTANCE_CONNECTION_NAME: 'amazeforgcp-public:us-central1:gcp-marketplace-postgresql'
  _DB_PASSWORD: 'v\.X16/ed;m~F/;8'

options:
  logging: CLOUD_LOGGING_ONLY
